# Bundle submission API (schemaVersion + files[]). Deploy with: wrangler deploy
# Secrets (wrangler secret put): GH_TOKEN, TURNSTILE_SECRET_KEY (required for production /ticket)
# Local dev without Turnstile: set var ALLOW_TICKET_WITHOUT_TURNSTILE=true (never in production).
# Optional bindings: LIMIT_KV; optional vars: DAILY_UPLOAD_LIMIT, DAILY_TICKET_ISSUE_LIMIT, UPLOAD_TICKET_TTL_SECONDS, TURNSTILE_EXPECTED_ACTION
# Client: Gamepad Mapping app — GET /turnstile-embed (WebView2), POST /ticket + /submit (ticket headers; turnstileToken when enabled)
# Worker name must match the existing workers.dev host (see communityProfilesUploadWorkerUrl in Gamepad Mapping defaults).
name = "gamepad-mapping-template-community-repo"
main = "src/index.ts"
compatibility_date = "2026-01-01"

[vars]
REPO_OWNER = "Maxim00191"
REPO_NAME = "GamepadMapping-CommunityProfiles"
BASE_BRANCH = "main"
DAILY_UPLOAD_LIMIT = "3"
DAILY_TICKET_ISSUE_LIMIT = "30"
UPLOAD_TICKET_TTL_SECONDS = "90"
TURNSTILE_EXPECTED_ACTION = "community_upload_ticket"

[[kv_namespaces]]
binding = "LIMIT_KV"
id = "9872ea6d40454f3784d9b7a4978e26eb"