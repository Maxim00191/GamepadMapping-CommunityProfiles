name: Validate Community Templates

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Regenerate index (informational)
        run: |
          # PR 阶段不阻塞 index.json 差异；合并后由 update-index workflow 自动更新
          python .scripts/generate_index.py

      - name: Forbid manual index.json changes in PR
        if: github.event_name == 'pull_request'
        run: |
          if git diff --name-only origin/main...HEAD | grep -Fxq "index.json"; then
            echo "ERROR: Do not modify index.json manually."
            echo "index.json is auto-managed after merge."
            exit 1
          fi

      - name: Install dependencies
        run: |
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run semantic validation
        run: |
          # 对所有 JSON 模板进行深度语义校验
          python .scripts/validate_templates.py . --check-duplicate-profile-ids \
            --incremental-semantic-git "$(git merge-base origin/main HEAD)...HEAD"
