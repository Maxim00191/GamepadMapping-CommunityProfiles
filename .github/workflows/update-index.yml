name: Update Community Index

on:
  push:
    branches: [main]
    paths:
      - '**/*.json'
      - '.scripts/generate_index.py'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Generate Index
        run: python .scripts/generate_index.py

      - name: Create PR for index update
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add index.json
          git diff --quiet && git diff --staged --quiet && exit 0

          BRANCH="auto/update-index"
          git checkout -B "$BRANCH"
          git commit -m "docs: auto-update community index"
          git push -f origin "$BRANCH"

          if gh pr list --state open --head "$BRANCH" --base main --json number --jq 'length > 0' | grep -q true; then
            echo "PR for index update already exists, skipping creation."
          else
            if gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "docs: auto-update community index" \
              --body "Automated update of \`index.json\` generated by workflow."; then
              echo "PR created successfully."
            else
              echo "Auto PR creation is blocked by repository policy for GitHub Actions."
              echo "Please enable: Settings > Actions > General > Workflow permissions > Allow GitHub Actions to create and approve pull requests."
              echo "Or create PR manually: https://github.com/${{ github.repository }}/pull/new/$BRANCH"
            fi
          fi
