name: Update Community Index

on:
  push:
    branches: [ main, dev/test-ci ]
    paths:
      - '**/*.json'
      - '.scripts/generate_index.py'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Generate Index
        run: python .scripts/generate_index.py

      - name: Create PR for index update
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add index.json
          git diff --quiet && git diff --staged --quiet && exit 0

          BRANCH="auto/update-index"
          git checkout -B "$BRANCH"
          git commit -m "docs: auto-update community index [skip ci]"
          git push -f origin "$BRANCH"

          if gh pr view "$BRANCH" --json number >/dev/null 2>&1; then
            echo "PR for index update already exists, skipping creation."
          else
            gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "docs: auto-update community index [skip ci]" \
              --body "Automated update of \`index.json\` generated by workflow."
          fi
